<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - Face Attendance System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg, #11998e, #38ef7d, #00c9ff, #92fe9d);
    background-size:400% 400%;
    animation: gradientBG 10s ease infinite;
}

/* Background animation */
@keyframes gradientBG {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:380px;
    padding:40px;
    border-radius:15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    text-align:center;
    color:white;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#ff9800;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    background:#e68900;
}

.top-right{
    position:absolute;
    right:20px;
    top:20px;
}

.top-left{
    position:absolute;
    left:20px;
    top:20px;
}

a{
    color:white;
    text-decoration:none;
}

</style>
</head>

<body>

<!-- Top buttons -->
<div class="top-left">⚙️</div>

<div class="top-right">
    <a href="/logout/">Logout</a>
</div>

<div class="container">

<h2>Register Student</h2>

<form method="POST">

    {% csrf_token %}

    <input 
        type="text" 
        name="name" 
        placeholder="Enter Name" 
        required
    >

    <input 
        type="text" 
        name="id" 
        placeholder="Enter Student ID"
        required
    >

    <input 
        type="email" 
        name="email" 
        placeholder="Enter Email"
        required
    >

    <button type="submit">
        Register
    </button>

</form>

</div>

<!-- Django Messages -->

{% if messages %}

<script>

{% for message in messages %}

alert("{{ message }}");

{% endfor %}

{% endif %}

</script>

</body>
</html>
