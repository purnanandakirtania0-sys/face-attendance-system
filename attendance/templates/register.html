<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register Student</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg,#11998e,#38ef7d,#00c9ff,#92fe9d);
    background-size:400% 400%;
    animation:gradientBG 10s ease infinite;
    padding:20px;
}

@keyframes gradientBG{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }

}

.container{

    width:100%;
    max-width:400px;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    text-align:center;
    color:white;

}

h2{

    margin-bottom:20px;

}

input{

    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:15px;

}

button{

    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#ff9800;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;

}

button:hover{

    background:#e68900;
    transform:scale(1.03);

}

video{

    width:100%;
    margin-top:15px;
    border-radius:15px;
    display:none;
    background:black;

}

canvas{

    display:none;

}

.top-right{

    position:absolute;
    top:20px;
    right:20px;

}

.top-right a{

    color:white;
    text-decoration:none;
    font-weight:bold;

}

</style>

</head>

<body>

<div class="top-right">

    <a href="/logout/">
        Logout
    </a>

</div>

<div class="container">

    <h2>
        Register Student
    </h2>

    <form id="registerForm" method="POST">

        {% csrf_token %}

        <input 
            type="text" 
            name="name"
            placeholder="Enter Name"
            required
        >

        <input 
            type="date"
            name="dob"
            required
        >

        <input 
            type="email"
            name="email"
            placeholder="Enter Email"
            required
        >

        <!-- Hidden image field -->

        <input 
            type="hidden"
            name="image"
            id="imageInput"
        >

        <!-- Camera -->

        <video 
            id="video"
            autoplay
            playsinline
        ></video>

        <canvas id="canvas"></canvas>

        <button type="submit">

            Register

        </button>

    </form>

</div>

<script>

const form = document.getElementById("registerForm");

const video = document.getElementById("video");

const canvas = document.getElementById("canvas");

const imageInput = document.getElementById("imageInput");

let cameraOpened = false;

form.addEventListener("submit", async function(e){

    if(cameraOpened === false){

        e.preventDefault();

        try{

            const stream = await navigator.mediaDevices.getUserMedia({

                video:{
                    facingMode:"user"
                },

                audio:false

            });

            video.srcObject = stream;

            video.style.display = "block";

            cameraOpened = true;

            alert("Camera Opened. Click Register Again.");

        }

        catch(error){

            alert("Camera Access Denied OR Camera Not Supported");

        }

        return;

    }

    e.preventDefault();

    canvas.width = video.videoWidth;

    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");

    ctx.drawImage(video,0,0);

    const imageData = canvas.toDataURL("image/png");

    imageInput.value = imageData;

    form.submit();

});

</script>

{% if messages %}

<script>

{% for message in messages %}

alert("{{ message }}");

{% endfor %}

</script>

{% endif %}

</body>

</html>
