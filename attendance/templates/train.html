<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>Train Model</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI;
}

body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:1000px;
    background:rgba(255,255,255,0.08);
    padding:40px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    text-align:center;
    color:white;
}

h1{
    margin-bottom:30px;
}

.students{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
}

.card{
    background:rgba(255,255,255,0.1);
    border-radius:15px;
    padding:15px;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:10px;
}

button{
    margin-top:30px;
    padding:14px 40px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#00e676;
}

.logout{
    position:absolute;
    top:20px;
    right:20px;
}

.logout a{
    color:white;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="logout">
<a href="/logout/">Logout</a>
</div>

<div class="container">

<h1>Train Face Model</h1>

<div class="students">

{% for student in students %}

<div class="card">

<img src="/dataset/{{ student.image }}" alt="face">

<h3>{{ student.name }}</h3>

<p>ID: {{ student.id }}</p>

<p>{{ student.email }}</p>

</div>

{% endfor %}

</div>

<form action="/train-model/" method="POST">

{% csrf_token %}

<button type="submit">
Train Faces
</button>

</form>

</div>

{% if messages %}

<script>

{% for message in messages %}

alert("{{ message }}");

{% endfor %}

</script>

{% endif %}

</body>
</html>
