<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Face Attendance System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    background:rgba(190, 188, 24, 0.43);
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141e30,#243b55);
    overflow:hidden;
}

.main-box{
    width:420px;
    padding:40px;
    border-radius:25px;
    background:rgba(32, 11, 150, 0.43);
    backdrop-filter:blur(12px);
    box-shadow:0 10px 40px rgba(48, 175, 16, 0.4);
    text-align:center;
    color:white;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        transform:translateY(30px);
        opacity:0;
    }
    to{
        transform:translateY(0);
        opacity:1;
    }
}

.main-box h1{
    margin-bottom:15px;
    font-size:32px;
}

.main-box p{
    color:dcdcdc;
    margin-bottom:30px;
}

.open-btn{
    padding:14px 40px;
    border:none;
    border-radius:12px;
    background:#00c853;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.open-btn:hover{
    transform:scale(1.05);
    background:#00e676;
}

.option-container{
    margin-top:30px;
    display:none;
    animation:slide 0.5s ease;
}

@keyframes slide{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.option-box{
    background:rgba(58, 28, 196, 0.1);
    padding:20px;
    border-radius:18px;
    margin-bottom:20px;
    transition:0.3s;
}

.option-box:hover{
    transform:translateY(-5px);
    background:rgba(255,255,255,0.15);
}

.option-box h2{
    margin-bottom:10px;
    font-size:22px;
}

.option-box p{
    font-size:14px;
    margin-bottom:15px;
}

.option-box a{
    display:inline-block;
    padding:10px 28px;
    border-radius:10px;
    background:#2196f3;
    color:white;
    text-decoration:none;
    transition:0.3s;
}

.option-box a:hover{
    background:#42a5f5;
}

.logout{
    position:absolute;
    top:20px;
    right:20px;
}

.logout a{
    text-decoration:none;
    color:white;
    background:red;
    padding:10px 20px;
    border-radius:10px;
}

</style>

</head>

<body>

<div class="logout">
    <a href="/logout/">Logout</a>
</div>

<div class="main-box">

    <h1>Face Attendance System</h1>

    <p>
        Register and Attendance 

    </p>
    
    <button class="open-btn" onclick="openMenu()">
        Open
    </button>

    <div class="option-container" id="menuBox">

        <!-- REGISTER -->

        <div class="option-box">

            <h2>Register Student</h2>

            <p>
                Register new student face data into system.
            </p>

            <a href="/register-face/">
                Open
            </a>

        </div>

        <!-- ATTENDANCE -->

        <div class="option-box">

            <h2>Give Attendance</h2>

            <p>
                Open camera and mark attendance automatically.
            </p>

            <a href="/attendance-page/">
                Open
            </a>

        </div>

        <!-- DASHBOARD -->

        <div class="option-box">

            <h2>View Dashboard</h2>

            <p>
                View attendance records and student reports.
            </p>

            <a href="/dashboard/">
                Open
            </a>

        </div>

    </div>

</div>

<script>

function openMenu(){

    let menu = document.getElementById("menuBox");

    if(menu.style.display === "block"){

        menu.style.display = "none";

    }else{

        menu.style.display = "block";
    }
}

</script>

</body>
</html>
