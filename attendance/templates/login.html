<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Face Attendance Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background: linear-gradient(
        -45deg,
        #00c6ff,
        #0072ff,
        #8e2de2,
        #ff4b2b
    );

    background-size:400% 400%;

    animation:bgAnimation 12s ease infinite;
}

/* ---------------- BACKGROUND ANIMATION ---------------- */

@keyframes bgAnimation{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

/* ---------------- FLOATING CIRCLES ---------------- */

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.1);
    animation:float 8s infinite ease-in-out;
}

.circle1{
    width:250px;
    height:250px;
    top:-80px;
    left:-80px;
}

.circle2{
    width:300px;
    height:300px;
    bottom:-100px;
    right:-100px;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(30px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* ---------------- LOGIN CONTAINER ---------------- */

.container{

    width:380px;

    padding:40px;

    border-radius:20px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(18px);

    box-shadow:0 8px 32px rgba(0,0,0,0.3);

    text-align:center;

    color:white;

    z-index:10;

    animation:fadeIn 1.2s ease;
}

/* ---------------- CARD ANIMATION ---------------- */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.container h2{

    margin-bottom:25px;

    font-size:30px;

    font-weight:700;
}

/* ---------------- INPUTS ---------------- */

input{

    width:100%;

    padding:14px;

    margin:12px 0;

    border:none;

    border-radius:12px;

    outline:none;

    background:rgba(255,255,255,0.2);

    color:white;

    font-size:15px;

    transition:0.3s;
}

input::placeholder{
    color:#eee;
}

input:focus{

    background:rgba(255,255,255,0.3);

    transform:scale(1.03);

    box-shadow:0 0 10px rgba(255,255,255,0.5);
}

/* ---------------- BUTTON ---------------- */

button{

    width:100%;

    padding:14px;

    margin-top:18px;

    border:none;

    border-radius:12px;

    background:linear-gradient(
        45deg,
        #00c6ff,
        #0072ff
    );

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:0.4s;
}

button:hover{

    transform:scale(1.05);

    box-shadow:0 0 18px rgba(255,255,255,0.6);
}

/* ---------------- MESSAGE ---------------- */

.message{

    margin-top:15px;

    color:#fff;

    font-size:14px;
}

</style>

</head>

<body>

<!-- FLOATING SHAPES -->

<div class="circle circle1"></div>
<div class="circle circle2"></div>

<!-- LOGIN BOX -->

<div class="container">

    <h2>Face Attendance</h2>

    <form method="POST">

        {% csrf_token %}

        <input
            type="email"
            name="email"
            placeholder="Enter Email"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <!-- DJANGO MESSAGE -->

    {% comment %} {% if messages %}

        {% for message in messages %}

            <div class="message">

                {{ message }}

            </div>

        {% endfor %}

    {% endif %} {% endcomment %}

</div>

</body>
</html>
